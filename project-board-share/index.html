<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Project Board</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #20242b;
      --grid-minor: rgba(226, 232, 240, 0.08);
      --grid-major: rgba(226, 232, 240, 0.14);
      --ink: #e7ebf0;
      --muted: #a8b0bc;
      --panel: rgba(35, 40, 49, 0.92);
      --panel-solid: #262c35;
      --line: rgba(226, 232, 240, 0.14);
      --shadow: 0 18px 50px rgba(4, 8, 14, 0.34);
      --accent: #2563eb;
      --group: rgba(255, 255, 255, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      position: fixed;
      inset: 0;
      background-color: var(--bg);
      background-image:
        linear-gradient(var(--grid-minor) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-minor) 1px, transparent 1px),
        linear-gradient(var(--grid-major) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-major) 1px, transparent 1px);
      background-size: 24px 24px, 24px 24px, 120px 120px, 120px 120px;
      user-select: none;
      touch-action: none;
    }

    .toolbar {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      max-width: calc(100vw - 32px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .toolbar button,
    .zoom-pill {
      min-width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 7px;
      background: #303743;
      color: var(--ink);
      border: 1px solid rgba(226, 232, 240, 0.12);
      box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset;
    }

    .toolbar button:hover {
      background: #3a4350;
    }

    .toolbar button:active {
      transform: translateY(1px);
    }

    .toolbar .primary {
      padding: 0 12px;
      background: #dce6f3;
      color: #111827;
      border-color: #dce6f3;
    }

    .toolbar .primary:hover {
      background: #ffffff;
    }

    .history-controls {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 21;
      display: flex;
      gap: 6px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(35, 40, 49, 0.74);
      box-shadow: 0 12px 34px rgba(4, 8, 14, 0.2);
      backdrop-filter: blur(12px);
    }

    .history-controls button {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      background: rgba(48, 55, 67, 0.86);
      color: var(--ink);
      border: 1px solid rgba(226, 232, 240, 0.12);
      box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset;
      font-size: 18px;
      line-height: 1;
    }

    .history-controls button:hover:not(:disabled) {
      background: #3a4350;
    }

    .history-controls button:disabled {
      opacity: 0.34;
      cursor: default;
    }

    .mode-button.active {
      background: #dce6f3;
      color: #111827;
      border-color: #dce6f3;
    }

    .tool-hidden {
      display: none !important;
    }

    .divider {
      width: 1px;
      height: 30px;
      background: rgba(226, 232, 240, 0.14);
    }

    .palette {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .swatch {
      width: 26px;
      height: 26px;
      min-width: 26px;
      border-radius: 50%;
      border: 2px solid rgba(15, 23, 42, 0.45);
      box-shadow: 0 0 0 2px rgba(226,232,240,0.28);
    }

    .swatch.active {
      outline: 3px solid #f8fafc;
      outline-offset: 2px;
    }

    .zoom-pill {
      width: 64px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .hint {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      max-width: min(380px, calc(100vw - 32px));
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(35, 40, 49, 0.86);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: grab;
    }

    .viewport.dragging {
      cursor: grabbing;
    }

    .world {
      position: absolute;
      left: 0;
      top: 0;
      width: 1px;
      height: 1px;
      transform-origin: 0 0;
    }

    .flow-edges {
      position: absolute;
      left: 0;
      top: 0;
      width: 1px;
      height: 1px;
      overflow: visible;
      pointer-events: none;
      z-index: 0;
    }

    .flow-edge {
      stroke: rgba(226, 232, 240, 0.72);
      stroke-width: 3;
      fill: none;
      marker-end: url(#arrowHead);
      pointer-events: stroke;
      cursor: pointer;
    }

    .flow-edge:hover {
      stroke-width: 5;
      filter: drop-shadow(0 0 7px rgba(226, 232, 240, 0.42));
    }

    .flow-edge.selected {
      stroke-width: 5;
      filter: drop-shadow(0 0 7px rgba(147, 197, 253, 0.72));
    }

    .flow-edge.dotted {
      stroke-dasharray: 9 8;
    }

    .flow-edge.preview {
      stroke: #93c5fd;
      stroke-dasharray: 8 7;
      marker-end: none;
      pointer-events: none;
    }

    .line-tools {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .line-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(15, 23, 42, 0.62);
      box-shadow: 0 0 0 1px rgba(226,232,240,0.28);
    }

    .line-swatch.active {
      outline: 2px solid #f8fafc;
      outline-offset: 2px;
    }

    .line-tools button:disabled {
      opacity: 0.42;
      cursor: default;
    }

    .line-tools button.active {
      background: #dce6f3;
      color: #111827;
      border-color: #dce6f3;
    }

    .flow-node {
      position: absolute;
      width: 220px;
      height: 102px;
      min-width: 150px;
      min-height: 76px;
      padding: 14px 12px;
      border-radius: 18px;
      border: 1px solid rgba(226, 232, 240, 0.24);
      background: #2d343f;
      color: var(--ink);
      box-shadow: 0 16px 42px rgba(4, 8, 14, 0.28);
      cursor: grab;
      user-select: none;
      isolation: isolate;
      overflow: hidden;
    }

    .flow-node.selected,
    .flow-node.connecting {
      outline: 3px solid rgba(147, 197, 253, 0.88);
      outline-offset: 5px;
    }

    .flow-node.connect-target {
      outline: 2px solid rgba(255, 255, 255, 0.92);
      outline-offset: 6px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.16),
        0 16px 44px rgba(4, 8, 14, 0.28);
      transform: scale(1.01);
      transition: transform 120ms ease, outline-color 120ms ease, box-shadow 120ms ease;
    }

    .flow-node textarea {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      resize: none;
      outline: none;
      background: transparent;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.35;
      font-weight: 700;
      user-select: text;
    }

    .flow-node-resize-handle {
      position: absolute;
      z-index: 4;
      opacity: 0;
      background: transparent;
    }

    .flow-node-resize-handle.edge-left,
    .flow-node-resize-handle.edge-right {
      top: 0;
      bottom: 0;
      width: 26px;
      cursor: ew-resize;
    }

    .flow-node-resize-handle.edge-left { left: 0; }
    .flow-node-resize-handle.edge-right { right: 0; }

    .flow-node-resize-handle.edge-bottom {
      left: 0;
      right: 0;
      bottom: 0;
      height: 26px;
      cursor: ns-resize;
    }

    .flow-node-resize-handle.corner-bottom-left,
    .flow-node-resize-handle.corner-bottom-right {
      bottom: 0;
      width: 40px;
      height: 40px;
    }

    .flow-node-resize-handle.corner-bottom-left {
      left: 0;
      cursor: nesw-resize;
    }

    .flow-node-resize-handle.corner-bottom-right {
      right: 0;
      cursor: nwse-resize;
    }

    .flow-node.align-center textarea,
    .flow-node.align-full textarea {
      text-align: center;
    }

    .flow-node.align-full {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flow-node.align-full textarea {
      flex: 1 1 auto;
    }

    .flow-node-actions {
      position: absolute;
      top: 7px;
      left: 8px;
      right: 8px;
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: flex-end;
    }

    .flow-node-action {
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(226, 232, 240, 0.14);
      border: 1px solid rgba(226, 232, 240, 0.16);
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
    }

    .flow-node-action:hover,
    .flow-node-action.active {
      background: rgba(147, 197, 253, 0.28);
      border-color: rgba(147, 197, 253, 0.56);
    }

    .flow-node-action.align-action {
      padding: 0 6px;
    }

    .note {
      position: absolute;
      width: 210px;
      height: 168px;
      min-width: 150px;
      min-height: 120px;
      padding: 22px 14px 14px;
      border: 1px solid rgba(20, 24, 30, 0.13);
      border-radius: 6px;
      box-shadow: 0 10px 24px rgba(31, 37, 45, 0.15);
      cursor: grab;
      user-select: none;
      overflow: hidden;
      isolation: isolate;
      transform-origin: center;
      transition: padding 140ms ease;
    }

    .note:focus-within {
      padding-top: 70px;
    }

    body.dragging-item,
    body.dragging-item * {
      cursor: grabbing !important;
    }

    .note::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 18px;
      border-radius: 6px 6px 0 0;
      background: rgba(255,255,255,0.22);
      z-index: 0;
      pointer-events: none;
      transition: height 140ms ease;
    }

    .note:focus-within::before {
      height: 54px;
    }

    .note-tools {
      position: absolute;
      top: 7px;
      left: 8px;
      right: 8px;
      z-index: 2;
      display: flex;
      gap: 5px;
      align-items: center;
      flex-wrap: wrap;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-3px);
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .note:focus-within .note-tools {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .note-tool {
      width: 28px;
      height: 24px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.46);
      border: 1px solid rgba(31, 37, 45, 0.14);
      color: #1f2937;
      font-size: 12px;
      font-weight: 850;
    }

    .note-tool.strike {
      text-decoration: line-through;
    }

    .highlight-tool {
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 5px;
      border: 1px solid rgba(31, 37, 45, 0.14);
      background: rgba(255, 255, 255, 0.58);
      color: #1f2937;
      font-size: 11px;
      font-weight: 850;
    }

    .highlight-tool.flash {
      animation: highlightFlash 520ms ease;
    }

    @keyframes highlightFlash {
      0% { box-shadow: 0 0 0 0 rgba(31, 41, 55, 0.3); transform: scale(1); }
      42% { box-shadow: 0 0 0 5px rgba(31, 41, 55, 0); transform: scale(1.08); }
      100% { box-shadow: 0 0 0 0 rgba(31, 41, 55, 0); transform: scale(1); }
    }

    .note-tool:hover,
    .note-tool.active,
    .highlight-tool:hover {
      background: rgba(255, 255, 255, 0.82);
    }

    .note-delete {
      position: absolute;
      top: -5px;
      right: -5px;
      width: 24px;
      height: 24px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: rgba(31, 41, 55, 0.62);
      font-size: 18px;
      font-weight: 500;
      line-height: 1;
      opacity: 0.68;
    }

    .note:hover .note-delete,
    .note-delete:focus-visible {
      opacity: 1;
    }

    .note-delete:hover {
      background: rgba(31, 41, 55, 0.14);
      color: #111827;
    }

    .note.selected {
      outline: 3px solid rgba(37, 99, 235, 0.78);
      outline-offset: 4px;
      box-shadow: 0 16px 34px rgba(31, 37, 45, 0.22);
    }

    .note textarea,
    .note-editor {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 78px;
      border: 0;
      padding: 0;
      resize: none;
      outline: none;
      background: transparent;
      color: #1f2937;
      line-height: 1.32;
      font-size: 17px;
      font-weight: 650;
      user-select: text;
      height: 100%;
      overflow: auto;
      overscroll-behavior: contain;
    }

    .note.has-group .note-editor,
    .note.has-group .checklist {
      height: calc(100% - 30px);
      max-height: calc(100% - 30px);
      min-height: 0;
    }

    .note-editor {
      white-space: pre-wrap;
      cursor: text;
    }

    .note-editor:empty::before {
      content: attr(data-placeholder);
      color: rgba(31, 41, 55, 0.52);
    }

    .note-editor ul,
    .note-editor ol {
      margin: 0;
      padding-left: 22px;
    }

    .note-editor li {
      margin: 2px 0;
    }

    .rich-check-item {
      display: block;
      position: relative;
      min-height: 1.32em;
      padding-left: 23px;
    }

    .rich-check-token {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      left: 0;
      top: 0;
      width: 18px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
    }

    .rich-check-token:hover {
      background: rgba(31, 41, 55, 0.12);
    }

    .rich-check-item.checked {
      color: rgba(31, 41, 55, 0.72);
    }

    .checklist {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-height: 106px;
      max-height: 100%;
      overflow: auto;
      overscroll-behavior: contain;
    }

    .note-resize-handle {
      position: absolute;
      z-index: 4;
      opacity: 0;
      background: transparent;
    }

    .note-resize-handle.edge-left,
    .note-resize-handle.edge-right {
      top: 28px;
      bottom: 0;
      width: 12px;
      cursor: ew-resize;
    }

    .note-resize-handle.edge-left {
      left: -4px;
    }

    .note-resize-handle.edge-right {
      right: -4px;
    }

    .note-resize-handle.edge-bottom {
      left: 12px;
      right: 12px;
      bottom: -4px;
      height: 14px;
      cursor: ns-resize;
    }

    .note-resize-handle.corner-bottom-left,
    .note-resize-handle.corner-bottom-right {
      bottom: -4px;
      width: 24px;
      height: 24px;
    }

    .note-resize-handle.corner-bottom-left {
      left: -4px;
      cursor: nesw-resize;
    }

    .note-resize-handle.corner-bottom-right {
      right: -4px;
      cursor: nwse-resize;
    }

    .check-item {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 7px;
      align-items: center;
    }

    .check-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #2563eb;
    }

    .check-item input[type="text"] {
      min-width: 0;
      border: 0;
      border-bottom: 1px solid rgba(31, 41, 55, 0.22);
      background: transparent;
      color: #1f2937;
      outline: none;
      font-size: 15px;
      font-weight: 650;
    }

    .check-add {
      align-self: flex-start;
      margin-top: 2px;
      height: 24px;
      padding: 0 8px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.48);
      border: 1px solid rgba(31, 37, 45, 0.14);
      color: #1f2937;
      font-size: 12px;
      font-weight: 800;
    }

    .note-group-tag {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 8px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      color: rgba(31, 41, 55, 0.72);
      font-size: 12px;
      font-weight: 800;
      pointer-events: none;
      padding-top: 6px;
      background: linear-gradient(to top, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0));
    }

    .note-group-dot {
      width: 9px;
      height: 9px;
      flex: 0 0 auto;
      border-radius: 50%;
      border: 1px solid rgba(31, 37, 45, 0.2);
    }

    .note-group-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .group {
      position: absolute;
      min-width: 520px;
      min-height: 250px;
      padding-top: 44px;
      border: 2px solid rgba(38, 47, 58, 0.24);
      border-radius: 8px;
      background: var(--group);
      box-shadow: 0 16px 42px rgba(31, 37, 45, 0.09) inset;
      pointer-events: auto;
      cursor: move;
    }

    .group-resize-handle {
      position: absolute;
      z-index: 5;
      opacity: 0;
      background: transparent;
    }

    .group-resize-handle.edge-left,
    .group-resize-handle.edge-right {
      top: 22px;
      bottom: 22px;
      width: 22px;
      cursor: ew-resize;
    }

    .group-resize-handle.edge-left { left: 0; }
    .group-resize-handle.edge-right { right: 0; }

    .group-resize-handle.edge-top,
    .group-resize-handle.edge-bottom {
      left: 22px;
      right: 22px;
      height: 22px;
      cursor: ns-resize;
    }

    .group-resize-handle.edge-top { top: 0; }
    .group-resize-handle.edge-bottom { bottom: 0; }

    .group-resize-handle.corner-top-left,
    .group-resize-handle.corner-top-right,
    .group-resize-handle.corner-bottom-left,
    .group-resize-handle.corner-bottom-right {
      width: 36px;
      height: 36px;
    }

    .group-resize-handle.corner-top-left {
      top: 0;
      left: 0;
      cursor: nwse-resize;
    }

    .group-resize-handle.corner-top-right {
      top: 0;
      right: 0;
      cursor: nesw-resize;
    }

    .group-resize-handle.corner-bottom-left {
      bottom: 0;
      left: 0;
      cursor: nesw-resize;
    }

    .group-resize-handle.corner-bottom-right {
      right: 0;
      bottom: 0;
      cursor: nwse-resize;
    }

    .group.selected {
      outline: 3px solid rgba(226, 232, 240, 0.72);
      outline-offset: 5px;
    }

    .group.drop-target {
      outline: 4px solid rgba(255, 255, 255, 0.9);
      outline-offset: 8px;
      box-shadow:
        0 0 0 10px rgba(255, 255, 255, 0.12),
        0 18px 60px rgba(4, 8, 14, 0.32),
        0 16px 42px rgba(31, 37, 45, 0.09) inset;
      transform: scale(1.015);
      transition: transform 140ms ease, outline-color 140ms ease, box-shadow 140ms ease;
    }

    .group-title {
      position: absolute;
      top: 10px;
      left: 14px;
      right: 298px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: rgba(31, 41, 55, 0.72);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .group-actions {
      position: absolute;
      z-index: 6;
      top: 8px;
      right: 10px;
      display: flex;
      gap: 6px;
      align-items: center;
      pointer-events: auto;
    }

    .group-action {
      width: auto;
      height: 30px;
      padding: 0 9px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(31, 37, 45, 0.18);
      color: rgba(31, 41, 55, 0.78);
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 1px 0 rgba(255,255,255,0.82) inset;
    }

    .group-action:hover {
      background: #fff;
      color: #111827;
    }

    .group-palette {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .group-swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(15, 23, 42, 0.45);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.38);
    }

    .group-swatch.active {
      outline: 2px solid #fff;
      outline-offset: 1px;
    }

    .selection-box {
      position: fixed;
      z-index: 15;
      border: 1px solid rgba(37, 99, 235, 0.9);
      background: rgba(37, 99, 235, 0.12);
      pointer-events: none;
      display: none;
    }

    .empty {
      position: fixed;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      z-index: 18;
      color: rgba(226, 232, 240, 0.22);
      font-size: clamp(28px, 6vw, 72px);
      font-weight: 850;
      letter-spacing: 0;
      pointer-events: none;
      white-space: nowrap;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(13, 18, 26, 0.62);
      backdrop-filter: blur(4px);
    }

    .modal.open {
      display: flex;
    }

    .dialog {
      width: min(440px, 100%);
      border-radius: 8px;
      padding: 20px;
      border: 2px solid rgba(37, 99, 235, 0.68);
      background: var(--panel-solid);
      box-shadow: 0 26px 80px rgba(6, 12, 24, 0.36);

    .dialog h2 {

    .dialog p {

    }

    .dialog input {
      width: 100%;
      height: 46px;
      border-radius: 7px;
      border: 1px solid rgba(31, 37, 45, 0.2);
      padding: 0 12px;
      outline: none;
      background: #f8fafc;
      color: #111827;
    }

    .dialog input:focus {
      border-color: rgba(37, 99, 235, 0.72);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }

    .dialog-actions button {
      height: 40px;
      padding: 0 14px;
      border-radius: 7px;
      background: #303743;
      color: var(--ink);
      border: 1px solid rgba(226, 232, 240, 0.14);

    .dialog-actions .confirm {

    }

    @media (max-width: 720px) {
      .toolbar {
        flex-wrap: wrap;
        right: 16px;
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main id="app" class="app" aria-label="Project board">
    <section class="toolbar" aria-label="Board tools">
      <button id="planningTab" class="mode-button active" title="Planning board">Planning</button>
      <button id="flowTab" class="mode-button" title="Flow chart">Flow Chart</button>
      <div class="divider" aria-hidden="true"></div>
      <button id="addNote" class="primary board-tool" title="Add sticky note">+ Note</button>
      <button id="addFlowNode" class="primary flow-tool tool-hidden" title="Add flow chart bubble">+ Bubble</button>
      <div id="flowLineTools" class="line-tools flow-tool tool-hidden" aria-label="Connector line styles"></div>
      <div id="flowAlignTools" class="line-tools flow-tool tool-hidden" aria-label="Flow text alignment"></div>
      <div class="palette board-tool" id="palette" aria-label="Sticky note colors"></div>
      <div class="divider board-tool" aria-hidden="true"></div>
      <button id="groupSelected" class="board-tool" title="Group selected notes">Group</button>
      <button id="deleteSelected" title="Delete selected item">Delete</button>
      <div class="divider" aria-hidden="true"></div>
      <button id="zoomOut" title="Zoom out">-</button>
      <div id="zoomReadout" class="zoom-pill" aria-live="polite">100%</div>
      <button id="zoomIn" title="Zoom in">+</button>
      <button id="resetView" title="Reset view">Reset</button>
      <button id="exportData" title="Download a backup of this board">Backup</button>
      <button id="importDataButton" title="Restore a board backup">Restore</button>
    </section>
    <section class="history-controls" aria-label="History">
      <button id="undoAction" title="Undo (Ctrl+Z / Cmd+Z)" aria-label="Undo">&larr;</button>
      <button id="redoAction" title="Redo (Ctrl+Y / Ctrl+Shift+Z / Cmd+Shift+Z)" aria-label="Redo">&rarr;</button>
    </section>
    <input id="importData" type="file" accept="application/json,.json" hidden>

    <div id="viewport" class="viewport">
      <div id="world" class="world"></div>
    </div>

    <div id="selectionBox" class="selection-box"></div>
    <aside id="hint" class="hint">Drag the board to pan. Use the mouse wheel or trackpad to zoom. Shift-drag to select several notes, then create a group.</aside>
  </main>

  <div id="empty" class="empty">Project Board</div>

  <div id="groupModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="groupTitle">
    <div class="dialog">
      <h2 id="groupTitle">Name this group</h2>
      <p id="groupSummary">Selected sticky notes will sit inside a labeled board area.</p>
      <input id="groupName" type="text" maxlength="40" placeholder="Group name">
      <div class="dialog-actions">
        <button id="cancelGroup">Cancel</button>
        <button id="confirmGroup" class="confirm">Save group</button>
      </div>
    </div>
  </div>

  <script>
    const colors = [
      { name: "Yellow", value: "#fff3a7" },
      { name: "Pink", value: "#ffc0d6" },
      { name: "Green", value: "#c9f5c9" },
      { name: "Blue", value: "#bfe1ff" },
      { name: "Orange", value: "#ffd49a" },
      { name: "Lavender", value: "#d8ccff" }
    ];

    const groupColors = ["#2563eb", "#dc2626", "#059669", "#d97706", "#7c3aed", "#0891b2", "#be123c"];
    const lineColors = ["#e2e8f0", "#60a5fa", "#34d399", "#f59e0b", "#f472b6", "#a78bfa", "#f87171"];
    const highlightColors = [
      { name: "Highlight", value: "" },
      { name: "Yellow", value: "#fff176" },
      { name: "Green", value: "#bbf7d0" },
      { name: "Blue", value: "#bfdbfe" },
      { name: "Pink", value: "#fbcfe8" },
      { name: "Clear", value: "transparent" }
    ];

    const app = document.getElementById("app");
    const viewport = document.getElementById("viewport");
    const world = document.getElementById("world");
    const empty = document.getElementById("empty");
    const palette = document.getElementById("palette");
    const selectionBox = document.getElementById("selectionBox");
    const groupModal = document.getElementById("groupModal");
    const groupName = document.getElementById("groupName");
    const groupSummary = document.getElementById("groupSummary");
    const zoomReadout = document.getElementById("zoomReadout");
    const flowLineTools = document.getElementById("flowLineTools");
    const flowAlignTools = document.getElementById("flowAlignTools");
    const importData = document.getElementById("importData");
    const undoAction = document.getElementById("undoAction");
    const redoAction = document.getElementById("redoAction");
    const planningTab = document.getElementById("planningTab");
    const flowTab = document.getElementById("flowTab");
    const hint = document.getElementById("hint");

    const board = {
      notes: [],
      groups: [],
      selectedIds: new Set(),
      selectedGroupId: null,
      dropTargetGroupId: null,
      color: colors[0].value,
      view: { x: window.innerWidth / 2, y: window.innerHeight / 2, scale: 1 },
      nextZ: 1,
      editingGroupId: null,
      mode: null
    };

    const flow = {
      nodes: [],
      edges: [],
      selectedNodeId: null,
      selectedNodeIds: new Set(),
      selectedEdgeIds: new Set(),
      connectFromId: null,
      connectTargetId: null,
      previewPoint: null,
      view: { x: window.innerWidth / 2, y: window.innerHeight / 2, scale: 1 }
    };

    let activeMode = "board";

    const storageKey = "project-board-v1";
    const defaultNoteWidth = 210;
    const defaultNoteHeight = 168;
    const minNoteWidth = 150;
    const minNoteHeight = 120;
    const minGroupWidth = 520;
    const minGroupHeight = 250;
    const defaultFlowNodeWidth = 220;
    const defaultFlowNodeHeight = 102;
    const minFlowNodeWidth = 150;
    const minFlowNodeHeight = 76;
    const historyLimit = 80;
    let undoStack = [];
    let redoStack = [];
    let lastSavedSnapshot = null;
    let lastHistoryKey = "";
    let isRestoringHistory = false;

    function noteWidth(note) {
      return Math.max(minNoteWidth, Number(note.width) || defaultNoteWidth);
    }

    function noteHeight(note) {
      return Math.max(minNoteHeight, Number(note.height) || defaultNoteHeight);
    }

    function flowNodeWidth(node) {
      return Math.max(minFlowNodeWidth, Number(node.width) || defaultFlowNodeWidth);
    }

    function flowNodeHeight(node) {
      return Math.max(minFlowNodeHeight, Number(node.height) || defaultFlowNodeHeight);
    }

    function uid(prefix) {
      return `${prefix}-${Math.random().toString(36).slice(2, 10)}-${Date.now().toString(36)}`;
    }

    function cloneData(data) {
      return JSON.parse(JSON.stringify(data));
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function plainTextToHtml(text) {
      if (!text) return "";
      return escapeHtml(text)
        .split("\n")
        .map(line => `<div>${line || "<br>"}</div>`)
        .join("");
    }

    function richTextToPlainText(editor) {
      return (editor.innerText || "")
        .replace(/\u00a0/g, " ")
        .replace(/\n$/, "");
    }

    function sanitizeRichHtml(html) {
      const allowed = new Set(["B", "STRONG", "I", "EM", "S", "STRIKE", "SPAN", "MARK", "UL", "OL", "LI", "DIV", "P", "BR"]);
      const allowedClasses = new Set(["rich-check-item", "rich-check-token", "checked"]);
      const template = document.createElement("template");
      template.innerHTML = String(html || "");
      const clean = document.createElement("div");

      const copyChildren = (source, target) => {
        source.childNodes.forEach(child => {
          if (child.nodeType === Node.TEXT_NODE) {
            target.appendChild(document.createTextNode(child.textContent));
            return;
          }
          if (child.nodeType !== Node.ELEMENT_NODE) return;
          if (!allowed.has(child.nodeName)) {
            copyChildren(child, target);
            return;
          }

          const next = document.createElement(child.nodeName.toLowerCase());
          const background = child.style?.backgroundColor;
          if (background) next.style.backgroundColor = background;
          const listStyle = child.style?.listStyleType;
          if ((child.nodeName === "OL" || child.nodeName === "UL") && listStyle) next.style.listStyleType = listStyle;
          const classes = [...child.classList].filter(name => allowedClasses.has(name));
          if (classes.length) next.className = classes.join(" ");
          if (classes.includes("rich-check-token")) next.contentEditable = "false";
          copyChildren(child, next);
          target.appendChild(next);
        });
      };

      copyChildren(template.content, clean);
      return clean.innerHTML;
    }

    function normalizeNoteHtml(note) {
      if (note.html) return sanitizeRichHtml(note.html);
      let html = plainTextToHtml(note.text || "");
      if (note.bold) html = `<b>${html}</b>`;
      if (note.italic) html = `<i>${html}</i>`;
      return sanitizeRichHtml(html);
    }

    function selectionIsInside(element) {
      const selection = window.getSelection();
      return Boolean(selection?.rangeCount && element.contains(selection.anchorNode));
    }

    function saveRichSelection(editor) {
      const selection = window.getSelection();
      if (!selection?.rangeCount || !editor.contains(selection.anchorNode)) return;
      editor._savedRange = selection.getRangeAt(0).cloneRange();
    }

    function restoreRichSelection(editor) {
      if (!editor._savedRange) return;
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(editor._savedRange);
    }

    function normalizeRichChecklistItems(editor) {
      editor.querySelectorAll(".rich-check-item").forEach(block => {
        const token = block.querySelector(":scope > .rich-check-token");
        if (!token) return;
        token.contentEditable = "false";
        token.textContent = block.classList.contains("checked") ? "☑" : "☐";
        if (block.firstChild !== token) block.insertBefore(token, block.firstChild);
      });
    }

    function updateNoteFromEditor(note, editor) {
      normalizeRichChecklistItems(editor);
      note.html = editor.innerHTML;
      note.text = richTextToPlainText(editor);
      saveRichSelection(editor);
      save();
    }

    function applyRichNoteCommand(note, editor, command, value = null) {
      editor.focus();
      restoreRichSelection(editor);
      document.execCommand(command, false, value);
      saveRichSelection(editor);
      updateNoteFromEditor(note, editor);
    }

    function selectionHasHighlight(editor) {
      const selection = window.getSelection();
      if (!selection?.rangeCount || !editor.contains(selection.anchorNode)) return false;
      let node = selection.anchorNode.nodeType === Node.TEXT_NODE ? selection.anchorNode.parentElement : selection.anchorNode;
      while (node && node !== editor) {
        if (node.style?.backgroundColor && node.style.backgroundColor !== "transparent") return true;
        node = node.parentElement;
      }
      return false;
    }

    function flashHighlightButton(button) {
      if (!button) return;
      button.classList.remove("flash");
      void button.offsetWidth;
      button.classList.add("flash");
    }

    function applyHighlight(note, editor, color, button = null) {
      editor.focus();
      restoreRichSelection(editor);
      const selection = window.getSelection();
      const hadSelection = Boolean(selection?.rangeCount && !selection.isCollapsed);
      document.execCommand("hiliteColor", false, color);
      if (hadSelection && selection.rangeCount) {
        const range = selection.getRangeAt(0).cloneRange();
        range.collapse(false);
        selection.removeAllRanges();
        selection.addRange(range);
      }
      document.execCommand("hiliteColor", false, "transparent");
      note.highlightColor = color === "transparent" ? highlightColors[1].value : color;
      flashHighlightButton(button);
      saveRichSelection(editor);
      updateNoteFromEditor(note, editor);
    }

    function ensureRichBlock(editor) {
      let block = currentRichBlock(editor);
      if (block && block !== editor) return block;
      const wrapper = document.createElement("div");
      while (editor.firstChild) wrapper.appendChild(editor.firstChild);
      if (!wrapper.childNodes.length) wrapper.appendChild(document.createElement("br"));
      editor.appendChild(wrapper);
      placeCaretAtStart(wrapper);
      return wrapper;
    }

    function toggleRichChecklistLine(note, editor) {
      editor.focus();
      restoreRichSelection(editor);
      const block = ensureRichBlock(editor);
      const existing = block.querySelector(":scope > .rich-check-token");
      if (existing) {
        existing.remove();
        block.classList.remove("rich-check-item", "checked");
      } else {
        const token = document.createElement("span");
        token.className = "rich-check-token";
        token.contentEditable = "false";
        token.textContent = "☐";
        block.classList.add("rich-check-item");
        block.insertBefore(token, block.firstChild);
      }
      saveRichSelection(editor);
      updateNoteFromEditor(note, editor);
    }

    function toggleRichCheckToken(note, editor, token) {
      const block = token.closest(".rich-check-item");
      const checked = !block.classList.contains("checked");
      block.classList.toggle("checked", checked);
      token.textContent = checked ? "☑" : "☐";
      updateNoteFromEditor(note, editor);
    }

    function currentRichBlock(editor) {
      const selection = window.getSelection();
      if (!selection?.rangeCount || !editor.contains(selection.anchorNode)) return null;
      let node = selection.anchorNode.nodeType === Node.TEXT_NODE ? selection.anchorNode.parentElement : selection.anchorNode;
      while (node && node !== editor) {
        if (["LI", "DIV", "P"].includes(node.nodeName)) return node;
        node = node.parentElement;
      }
      return editor;
    }

    function placeCaretAtStart(element) {
      const range = document.createRange();
      range.selectNodeContents(element);
      range.collapse(true);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function autoCreateRichList(event, note, editor) {
      if (event.key !== " " || event.ctrlKey || event.metaKey || event.altKey || event.shiftKey) return false;
      if (!selectionIsInside(editor) || !window.getSelection().isCollapsed) return false;
      const block = currentRichBlock(editor);
      if (!block) return false;
      const marker = (block.textContent || "").trim();
      const ordered = marker.match(/^(\d+|[a-zA-Z])\.$/);
      const unordered = marker === "-" || marker === "*";
      if (!ordered && !unordered) return false;

      event.preventDefault();
      block.textContent = "";
      placeCaretAtStart(block);
      document.execCommand(ordered ? "insertOrderedList" : "insertUnorderedList");
      if (ordered && /^[a-zA-Z]\.$/.test(marker)) {
        const list = currentRichBlock(editor)?.closest("ol");
        if (list) list.style.listStyleType = "lower-alpha";
      }
      updateNoteFromEditor(note, editor);
      return true;
    }

    function handleRichEditorKeydown(event, note, editor) {
      const key = event.key.toLowerCase();
      const usesCommand = event.ctrlKey || event.metaKey;
      if (autoCreateRichList(event, note, editor)) return true;
      if (event.key === "Tab") {
        event.preventDefault();
        event.stopPropagation();
        document.execCommand(event.shiftKey ? "outdent" : "indent");
        updateNoteFromEditor(note, editor);
        return true;
      }
      if (usesCommand && event.shiftKey && key === "x") {
        event.preventDefault();
        applyRichNoteCommand(note, editor, "strikeThrough");
        return true;
      }
      if (usesCommand && key === "b") {
        event.preventDefault();
        applyRichNoteCommand(note, editor, "bold");
        return true;
      }
      if (usesCommand && key === "i") {
        event.preventDefault();
        applyRichNoteCommand(note, editor, "italic");
        return true;
      }
      if (usesCommand && event.shiftKey && key === "8") {
        event.preventDefault();
        applyRichNoteCommand(note, editor, "insertUnorderedList");
        return true;
      }
      if (usesCommand && event.shiftKey && key === "7") {
        event.preventDefault();
        applyRichNoteCommand(note, editor, "insertOrderedList");
        return true;
      }
      if (usesCommand && event.shiftKey && key === "h") {
        event.preventDefault();
        applyHighlight(note, editor, selectionHasHighlight(editor) ? "transparent" : (note.highlightColor || highlightColors[1].value));
        return true;
      }
      return false;
    }

    function removableIndentLength(text) {
      if (text.startsWith("    ")) return 4;
      if (text.startsWith("\t")) return 1;
      return text.match(/^ {1,4}/)?.[0].length || 0;
    }

    function handleTabIndent(event, field, applyValue) {
      if (event.key !== "Tab" || event.ctrlKey || event.metaKey || event.altKey) return false;
      event.preventDefault();
      event.stopPropagation();

      const indent = "    ";
      const value = field.value;
      const start = field.selectionStart ?? value.length;
      const end = field.selectionEnd ?? start;

      const commit = (nextValue, nextStart, nextEnd = nextStart) => {
        field.value = nextValue;
        field.setSelectionRange(nextStart, nextEnd);
        applyValue(nextValue);
      };

      if (field.tagName === "TEXTAREA") {
        const lineStart = value.lastIndexOf("\n", Math.max(0, start - 1)) + 1;
        const adjustedEnd = end > start && value[end - 1] === "\n" ? end - 1 : end;
        const nextBreak = value.indexOf("\n", adjustedEnd);
        const lineEnd = nextBreak === -1 ? value.length : nextBreak;
        const segment = value.slice(lineStart, lineEnd);
        const lines = segment.split("\n");

        if (event.shiftKey) {
          let offset = 0;
          let removedBeforeStart = 0;
          let removedBeforeEnd = 0;
          const nextSegment = lines.map(line => {
            const remove = removableIndentLength(line);
            const absoluteLineStart = lineStart + offset;
            if (absoluteLineStart < start) removedBeforeStart += Math.min(remove, start - absoluteLineStart);
            if (absoluteLineStart < end) removedBeforeEnd += Math.min(remove, end - absoluteLineStart);
            offset += line.length + 1;
            return line.slice(remove);
          }).join("\n");
          commit(
            value.slice(0, lineStart) + nextSegment + value.slice(lineEnd),
            start - removedBeforeStart,
            end - removedBeforeEnd
          );
          return true;
        }

        const nextSegment = lines.map(line => indent + line).join("\n");
        const added = lines.length * indent.length;
        commit(
          value.slice(0, lineStart) + nextSegment + value.slice(lineEnd),
          start + indent.length,
          end + added
        );
        return true;
      }

      if (event.shiftKey) {
        const remove = removableIndentLength(value);
        if (!remove) return true;
        commit(value.slice(remove), Math.max(0, start - remove), Math.max(0, end - remove));
        return true;
      }

      commit(indent + value, start + indent.length, end + indent.length);
      return true;
    }

    function getSaveData() {
      return {
        notes: board.notes,
        groups: board.groups,
        color: board.color,
        view: board.view,
        nextZ: board.nextZ,
        activeMode,
        flow: {
          nodes: flow.nodes,
          edges: flow.edges,
          view: flow.view
        }
      };
    }

    function getHistoryKey(data) {
      const historyData = cloneData(data);
      delete historyData.view;
      delete historyData.activeMode;
      if (historyData.flow) delete historyData.flow.view;
      return JSON.stringify(historyData);
    }

    function updateHistoryButtons() {
      undoAction.disabled = undoStack.length === 0;
      redoAction.disabled = redoStack.length === 0;
    }

    function resetHistoryBaseline() {
      const current = cloneData(getSaveData());
      lastSavedSnapshot = current;
      lastHistoryKey = getHistoryKey(current);
      undoStack = [];
      redoStack = [];
      updateHistoryButtons();
    }

    function applySavedData(data) {
      board.notes = Array.isArray(data.notes) ? data.notes : [];
      board.groups = Array.isArray(data.groups) ? data.groups : [];
      board.notes.forEach(note => {
        note.bold = Boolean(note.bold);
        note.italic = Boolean(note.italic);
        note.checklist = Boolean(note.checklist);
        note.highlightColor = note.highlightColor || highlightColors[1].value;
        note.width = noteWidth(note);
        note.height = noteHeight(note);
        if (note.checklist && !Array.isArray(note.items)) {
          note.items = (note.text || "").split("\n").filter(Boolean).map(text => ({ text, done: false }));
        }
        if (note.checklist) {
          const items = Array.isArray(note.items) && note.items.length ? note.items : [{ text: note.text || "", done: false }];
          note.html = items.map(item => {
            const checked = item.done ? " checked" : "";
            const token = item.done ? "☑" : "☐";
            return `<div class="rich-check-item${checked}"><span class="rich-check-token" contenteditable="false">${token}</span>${escapeHtml(item.text || "")}</div>`;
          }).join("");
          note.text = items.map(item => item.text || "").join("\n");
          note.items = [];
          note.checklist = false;
        }
        note.html = normalizeNoteHtml(note);
      });
      board.groups.forEach((group, index) => {
        group.color = group.color || groupColors[index % groupColors.length];
        group.noteColor = group.noteColor || colors[index % colors.length].value;
        group.width = Math.max(minGroupWidth, Number(group.width) || minGroupWidth);
        group.height = Math.max(minGroupHeight, Number(group.height) || minGroupHeight);
      });
      board.color = data.color || colors[0].value;
      board.view = data.view || board.view;
      if (data.flow) {
        flow.nodes = Array.isArray(data.flow.nodes) ? data.flow.nodes : [];
        flow.nodes.forEach(node => {
          node.id = node.id || uid("flow");
          node.align = node.align || "left";
          node.width = flowNodeWidth(node);
          node.height = flowNodeHeight(node);
        });
        flow.edges = Array.isArray(data.flow.edges) ? data.flow.edges : [];
        flow.edges.forEach(edge => {
          edge.id = edge.id || uid("edge");
          edge.color = edge.color || lineColors[0];
          edge.dotted = Boolean(edge.dotted);
        });
        flow.view = data.flow.view || flow.view;
      } else {
        flow.nodes = [];
        flow.edges = [];
      }
      activeMode = data.activeMode === "flow" ? "flow" : "board";
      board.selectedIds = new Set();
      board.selectedGroupId = null;
      flow.selectedNodeId = null;
      flow.selectedNodeIds = new Set();
      flow.selectedEdgeIds = new Set();
      flow.connectFromId = null;
      flow.connectTargetId = null;
      flow.previewPoint = null;
      const highestNoteZ = board.notes.reduce((highest, note, index) => {
        if (!note.z) note.z = index + 1;
        return Math.max(highest, note.z);
      }, 0);
      const highestFlowZ = flow.nodes.reduce((highest, node, index) => {
        if (!node.z) node.z = highestNoteZ + index + 1;
        return Math.max(highest, node.z);
      }, 0);
      board.nextZ = Math.max(data.nextZ || 1, highestNoteZ + 1, highestFlowZ + 1);
    }

    function save() {
      const current = cloneData(getSaveData());
      const currentHistoryKey = getHistoryKey(current);
      if (!isRestoringHistory && lastSavedSnapshot && currentHistoryKey !== lastHistoryKey) {
        undoStack.push(cloneData(lastSavedSnapshot));
        if (undoStack.length > historyLimit) undoStack.shift();
        redoStack = [];
      }
      localStorage.setItem(storageKey, JSON.stringify(current));
      lastSavedSnapshot = cloneData(current);
      lastHistoryKey = currentHistoryKey;
      updateHistoryButtons();
    }

    function load() {
      const raw = localStorage.getItem(storageKey);
      if (!raw) return;
      try {
        applySavedData(JSON.parse(raw));
      } catch {
        localStorage.removeItem(storageKey);
      }
    }

    function restoreHistoryState(data) {
      const preservedBoardView = cloneData(board.view);
      const preservedFlowView = cloneData(flow.view);
      const preservedActiveMode = activeMode;
      isRestoringHistory = true;
      applySavedData(cloneData(data));
      board.view = preservedBoardView;
      flow.view = preservedFlowView;
      activeMode = preservedActiveMode;
      const current = cloneData(getSaveData());
      localStorage.setItem(storageKey, JSON.stringify(current));
      lastSavedSnapshot = cloneData(current);
      lastHistoryKey = getHistoryKey(current);
      isRestoringHistory = false;
      setActiveMode(activeMode);
      updateHistoryButtons();
    }

    function undo() {
      if (!undoStack.length) return;
      redoStack.push(cloneData(getSaveData()));
      if (redoStack.length > historyLimit) redoStack.shift();
      restoreHistoryState(undoStack.pop());
    }

    function redo() {
      if (!redoStack.length) return;
      undoStack.push(cloneData(getSaveData()));
      if (undoStack.length > historyLimit) undoStack.shift();
      restoreHistoryState(redoStack.pop());
    }

    function exportBoardData() {
      const payload = {
        app: "project-board",
        exportedAt: new Date().toISOString(),
        ...getSaveData()
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const link = document.createElement("a");
      const date = new Date().toISOString().slice(0, 10);
      link.href = URL.createObjectURL(blob);
      link.download = `project-board-backup-${date}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(link.href), 500);
    }

    function importBoardData(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        try {
          const data = JSON.parse(reader.result);
          if (!data || (!Array.isArray(data.notes) && !data.flow)) {
            throw new Error("Invalid backup");
          }
          const shouldReplace = window.confirm("Restore this backup? This will replace the current board in this browser.");
          if (!shouldReplace) return;
          applySavedData(data);
          save();
          render();
        } catch {
          window.alert("That file does not look like a project board backup.");
        } finally {
          importData.value = "";
        }
      });
      reader.readAsText(file);
    }

    function screenToWorld(clientX, clientY) {
      const view = activeMode === "flow" ? flow.view : board.view;
      return {
        x: (clientX - view.x) / view.scale,

      };

      zoomReadout.textContent = `${Math.round(view.scale * 100)}%`;

    function fitGroupsToMembers(excludeIds = new Set()) {
      const pad = 28;
      const header = 58;
      board.groups.forEach(group => {
        group.width = Math.max(minGroupWidth, Number(group.width) || minGroupWidth);
        group.height = Math.max(minGroupHeight, Number(group.height) || minGroupHeight);
        const members = board.notes.filter(note => note.groupId === group.id && !excludeIds.has(note.id));
        if (!members.length) return;
        const left = Math.min(...members.map(note => note.x));
        const top = Math.min(...members.map(note => note.y));
        const right = Math.max(...members.map(note => note.x + noteWidth(note)));
        const bottom = Math.max(...members.map(note => note.y + noteHeight(note)));
        const nextLeft = Math.min(group.x, left - pad);
        const nextTop = Math.min(group.y, top - header);
        const nextRight = Math.max(group.x + group.width, right + pad);
        const nextBottom = Math.max(group.y + group.height, bottom + pad);
        group.x = nextLeft;
        group.y = nextTop;
        group.width = Math.max(minGroupWidth, nextRight - nextLeft);
        group.height = Math.max(minGroupHeight, nextBottom - nextTop);
      });
    }

    function findDropTargetGroup(notes) {
      const candidates = notes
        .map(note => ({ x: note.x + noteWidth(note) / 2, y: note.y + noteHeight(note) / 2 }))
        .filter(Boolean);
      for (let index = board.groups.length - 1; index >= 0; index -= 1) {
        const group = board.groups[index];
        const inside = candidates.some(point =>
          point.x >= group.x &&
          point.x <= group.x + group.width &&
          point.y >= group.y &&
          point.y <= group.y + group.height
        );
        if (inside) return group.id;
      }
      return null;
    }
