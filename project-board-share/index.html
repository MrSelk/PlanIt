    function nodeCenter(node) {
      return {
        x: node.x + flowNodeWidth(node) / 2,
        y: node.y + flowNodeHeight(node) / 2
      };
    }

    function edgePath(fromNode, toPoint) {
      const from = nodeCenter(fromNode);
      const dx = Math.max(80, Math.abs(toPoint.x - from.x) * 0.5);
      return `M ${from.x} ${from.y} C ${from.x + dx} ${from.y}, ${toPoint.x - dx} ${toPoint.y}, ${toPoint.x} ${toPoint.y}`;
    }

    function findFlowNodeAt(point, excludeId = null) {
      for (let index = flow.nodes.length - 1; index >= 0; index -= 1) {
        const node = flow.nodes[index];
        if (node.id === excludeId) continue;
        const inside =
          point.x >= node.x &&
          point.x <= node.x + flowNodeWidth(node) &&
          point.y >= node.y &&
          point.y <= node.y + flowNodeHeight(node);
        if (inside) return node.id;
      }
      return null;
    }

    function updateFlowEdgePaths() {
      flow.edges.forEach(edge => {
        const fromNode = flow.nodes.find(node => node.id === edge.from);
        const toNode = flow.nodes.find(node => node.id === edge.to);
        const path = document.querySelector(`.flow-edge[data-id="${edge.id}"]`);
        if (fromNode && toNode && path) {
          path.setAttribute("d", edgePath(fromNode, nodeCenter(toNode)));
        }
      });
      if (flow.connectFromId && flow.previewPoint) {
        const fromNode = flow.nodes.find(node => node.id === flow.connectFromId);
        const preview = document.querySelector(".flow-edge.preview");
        if (fromNode && preview) preview.setAttribute("d", edgePath(fromNode, flow.previewPoint));
      }
    }

    function renderFlow() {
      document.querySelectorAll(".flow-node, .flow-edges").forEach(node => node.remove());

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.classList.add("flow-edges");
      const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
      lineColors.forEach((color, index) => {
        const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
        marker.id = `arrowHead-${index}`;
        marker.setAttribute("markerWidth", "10");
        marker.setAttribute("markerHeight", "10");
        marker.setAttribute("refX", "8");
        marker.setAttribute("refY", "3");
        marker.setAttribute("orient", "auto");
        marker.setAttribute("markerUnits", "strokeWidth");
        const markerPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
        markerPath.setAttribute("d", "M0,0 L0,6 L9,3 z");
        markerPath.setAttribute("fill", color);
        marker.appendChild(markerPath);
        defs.appendChild(marker);
      });
      svg.appendChild(defs);

      flow.edges.forEach(edge => {
        const fromNode = flow.nodes.find(node => node.id === edge.from);
        const toNode = flow.nodes.find(node => node.id === edge.to);
        if (!fromNode || !toNode) return;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.classList.add("flow-edge");
        if (flow.selectedEdgeIds.has(edge.id)) path.classList.add("selected");
        if (edge.dotted) path.classList.add("dotted");
        const color = edge.color || lineColors[0];
        const markerIndex = Math.max(0, lineColors.indexOf(color));
        path.dataset.id = edge.id;
        path.style.stroke = color;
        path.setAttribute("marker-end", `url(#arrowHead-${markerIndex})`);
        path.setAttribute("d", edgePath(fromNode, nodeCenter(toNode)));
        path.addEventListener("pointerdown", event => event.stopPropagation());
        path.addEventListener("click", event => {
          event.stopPropagation();
          if (event.ctrlKey || event.metaKey) {
            if (flow.selectedEdgeIds.has(edge.id)) {
              flow.selectedEdgeIds.delete(edge.id);
            } else {
              flow.selectedEdgeIds.add(edge.id);
            }
          } else {
            flow.selectedEdgeIds = new Set([edge.id]);
          }
          flow.selectedNodeId = null;
          flow.selectedNodeIds = new Set();
          flow.connectFromId = null;
          flow.connectTargetId = null;
          flow.previewPoint = null;
          render();
        });
        svg.appendChild(path);
      });

      if (flow.connectFromId && flow.previewPoint) {
        const fromNode = flow.nodes.find(node => node.id === flow.connectFromId);
        if (fromNode) {
          const preview = document.createElementNS("http://www.w3.org/2000/svg", "path");
          preview.classList.add("flow-edge", "preview");
          preview.setAttribute("d", edgePath(fromNode, flow.previewPoint));
          svg.appendChild(preview);
        }
      }

      world.appendChild(svg);

      flow.nodes.forEach(node => {
        const div = document.createElement("article");
        div.className = "flow-node" +
          ` align-${node.align || "left"}` +
          (flow.selectedNodeIds.has(node.id) ? " selected" : "") +
          (flow.connectFromId === node.id ? " connecting" : "") +
          (flow.connectTargetId === node.id ? " connect-target" : "");
        div.dataset.id = node.id;
        div.style.left = `${node.x}px`;
        div.style.top = `${node.y}px`;
        node.width = flowNodeWidth(node);
        node.height = flowNodeHeight(node);
        div.style.width = `${node.width}px`;
        div.style.height = `${node.height}px`;
        div.style.zIndex = node.z || 1;

        const textarea = document.createElement("textarea");
        textarea.value = node.text;
        textarea.placeholder = "Flow step...";
        textarea.addEventListener("input", () => {
          node.text = textarea.value;
          save();
        });
        textarea.addEventListener("keydown", event => handleTabIndent(event, textarea, value => {
          node.text = value;
          save();
        }));
        textarea.addEventListener("pointerdown", event => {
          if (event.button === 1 || (event.button === 0 && flow.connectFromId)) {
            beginFlowNodeDrag(event, node.id);
            return;
          }
          event.stopPropagation();
        });
        textarea.addEventListener("auxclick", event => event.preventDefault());

        div.append(textarea);
        [
          { edge: "left", className: "edge-left" },
          { edge: "right", className: "edge-right" },
          { edge: "bottom", className: "edge-bottom" },
          { edge: "bottom-left", className: "corner-bottom-left" },
          { edge: "bottom-right", className: "corner-bottom-right" }
        ].forEach(handle => {
          const resizeHandle = document.createElement("div");
          resizeHandle.className = `flow-node-resize-handle ${handle.className}`;
          resizeHandle.setAttribute("aria-hidden", "true");
          resizeHandle.addEventListener("pointerdown", event => beginFlowNodeResize(event, node.id, handle.edge));
          div.appendChild(resizeHandle);
        });
        div.addEventListener("pointerdown", event => beginFlowNodeDrag(event, node.id));
        div.addEventListener("auxclick", event => event.preventDefault());
        world.appendChild(div);
      });

      empty.textContent = "Flow Chart";
      empty.style.display = flow.nodes.length ? "none" : "block";
      renderFlowLineTools();
      renderFlowAlignTools();
    }

    function createFlowNode(x, y, text = "") {
      const node = {
        id: uid("flow"),
        x,
        y,
        text,
        align: "left",
        width: defaultFlowNodeWidth,
        height: defaultFlowNodeHeight,
        z: board.nextZ++
      };
      flow.nodes.push(node);
      flow.selectedNodeId = node.id;
      flow.selectedNodeIds = new Set([node.id]);
      flow.selectedEdgeIds = new Set();
      flow.connectFromId = null;
      flow.connectTargetId = null;
      flow.previewPoint = null;
      render();
      save();
      requestAnimationFrame(() => {
        document.querySelector(`.flow-node[data-id="${node.id}"] textarea`)?.focus();
      });
    }

    function removeFlowNode(id) {
      flow.nodes = flow.nodes.filter(node => node.id !== id);
      flow.edges = flow.edges.filter(edge => edge.from !== id && edge.to !== id);
      flow.selectedEdgeIds = new Set([...flow.selectedEdgeIds].filter(edgeId => flow.edges.some(edge => edge.id === edgeId)));
      if (flow.selectedNodeId === id) flow.selectedNodeId = null;
      flow.selectedNodeIds.delete(id);
      if (flow.connectFromId === id) flow.connectFromId = null;
      if (flow.connectTargetId === id) flow.connectTargetId = null;
      flow.previewPoint = null;
      render();
      save();
    }

    function removeSelectedFlowNodes() {
      if (!flow.selectedNodeIds.size) return false;
      const ids = new Set(flow.selectedNodeIds);
      flow.nodes = flow.nodes.filter(node => !ids.has(node.id));
      flow.edges = flow.edges.filter(edge => !ids.has(edge.from) && !ids.has(edge.to));
      flow.selectedNodeId = null;
      flow.selectedNodeIds = new Set();
      flow.selectedEdgeIds = new Set([...flow.selectedEdgeIds].filter(edgeId => flow.edges.some(edge => edge.id === edgeId)));
      if (ids.has(flow.connectFromId)) flow.connectFromId = null;
      if (ids.has(flow.connectTargetId)) flow.connectTargetId = null;
      flow.previewPoint = null;
      render();
      save();
      return true;
    }

    function removeSelectedFlowEdges() {
      if (!flow.selectedEdgeIds.size) return false;
      flow.edges = flow.edges.filter(edge => !flow.selectedEdgeIds.has(edge.id));
      flow.selectedEdgeIds = new Set();
      render();
      save();
      return true;
    }

    function connectFlowNodes(from, to) {
      if (!from || !to || from === to) return;
      const exists = flow.edges.some(edge => edge.from === from && edge.to === to);
      if (!exists) {
        const edge = { id: uid("edge"), from, to, color: lineColors[0], dotted: false };
        flow.edges.push(edge);
        flow.selectedEdgeIds = new Set([edge.id]);
      }
      flow.connectFromId = null;
      flow.connectTargetId = null;
      flow.previewPoint = null;
      flow.selectedNodeId = to;
      flow.selectedNodeIds = new Set([to]);
      render();
      save();
    }

    function beginFlowNodeDrag(event, id) {
      if (event.button !== 0 && event.button !== 1) return;
      event.preventDefault();
      event.stopPropagation();
      const node = flow.nodes.find(item => item.id === id);
      if (!node) return;

      if (event.button === 1) {
        flow.connectFromId = id;
        flow.previewPoint = nodeCenter(node);
        flow.connectTargetId = null;
        flow.selectedNodeId = id;
        flow.selectedNodeIds = new Set([id]);
        flow.selectedEdgeIds = new Set();
        render();
        return;
      }

      if (flow.connectFromId) {
        if (flow.connectFromId !== id) {
          connectFlowNodes(flow.connectFromId, id);
        } else {
          flow.connectFromId = null;
          flow.previewPoint = null;
          flow.connectTargetId = null;
          render();
        }
        return;
      }

      if (event.ctrlKey || event.metaKey) {
        if (flow.selectedNodeIds.has(id)) {
          flow.selectedNodeIds.delete(id);
        } else {
          flow.selectedNodeIds.add(id);
        }
        flow.selectedNodeId = id;
      } else if (!flow.selectedNodeIds.has(id)) {
        flow.selectedNodeIds = new Set([id]);
        flow.selectedNodeId = id;
      } else {
        flow.selectedNodeId = id;
      }
      flow.selectedEdgeIds = new Set();
      const selectedNodes = flow.nodes.filter(item => flow.selectedNodeIds.has(item.id));
      selectedNodes.forEach(item => {
        item.z = board.nextZ++;
      });
      document.querySelectorAll(".flow-node").forEach(nodeEl => {
        nodeEl.classList.toggle("selected", flow.selectedNodeIds.has(nodeEl.dataset.id));
        const selected = flow.nodes.find(item => item.id === nodeEl.dataset.id);
        if (selected) nodeEl.style.zIndex = selected.z || 1;
      });
      renderFlowLineTools();
      renderFlowAlignTools();

      const start = screenToWorld(event.clientX, event.clientY);
      const originals = selectedNodes.map(item => ({ id: item.id, x: item.x, y: item.y }));
      board.mode = "drag-flow-node";
      document.body.classList.add("dragging-item");
      event.currentTarget.setPointerCapture(event.pointerId);

      const move = moveEvent => {
        const now = screenToWorld(moveEvent.clientX, moveEvent.clientY);
        const dx = now.x - start.x;
        const dy = now.y - start.y;
        originals.forEach(original => {
          const item = flow.nodes.find(candidate => candidate.id === original.id);
          if (!item) return;
          item.x = original.x + dx;
          item.y = original.y + dy;
          const nodeEl = document.querySelector(`.flow-node[data-id="${item.id}"]`);
          if (nodeEl) {
            nodeEl.style.left = `${item.x}px`;
            nodeEl.style.top = `${item.y}px`;
            nodeEl.style.zIndex = item.z || 1;
          }
        });
        renderFlow();
      };

      const up = () => {
        board.mode = null;
        document.body.classList.remove("dragging-item");
        window.removeEventListener("pointermove", move);
        window.removeEventListener("pointerup", up);
        save();
      };

      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", up, { once: true });
    }

    function beginFlowNodeResize(event, id, edge) {
      if (event.button !== 0) return;
      event.preventDefault();
      event.stopPropagation();
      const node = flow.nodes.find(item => item.id === id);
      if (!node) return;
      flow.selectedNodeId = id;
      flow.selectedNodeIds = new Set([id]);
      flow.selectedEdgeIds = new Set();
      node.z = board.nextZ++;
      document.querySelectorAll(".flow-node").forEach(nodeEl => {
        nodeEl.classList.toggle("selected", nodeEl.dataset.id === id);
        if (nodeEl.dataset.id === id) nodeEl.style.zIndex = node.z;
      });
      renderFlowLineTools();
      renderFlowAlignTools();

      const start = screenToWorld(event.clientX, event.clientY);
      const original = {
        x: node.x,
        y: node.y,
        width: flowNodeWidth(node),
        height: flowNodeHeight(node)
      };
      board.mode = "resize-flow-node";
      document.body.style.cursor = getComputedStyle(event.currentTarget).cursor;
      event.currentTarget.setPointerCapture(event.pointerId);

      const move = moveEvent => {
        const now = screenToWorld(moveEvent.clientX, moveEvent.clientY);
        const dx = now.x - start.x;
        const dy = now.y - start.y;

        if (edge.includes("left")) {
          const nextWidth = Math.max(minFlowNodeWidth, original.width - dx);
          node.width = nextWidth;
          node.x = original.x + original.width - nextWidth;
        }
        if (edge.includes("right")) {
          node.width = Math.max(minFlowNodeWidth, original.width + dx);
        }
        if (edge.includes("bottom")) {
          node.height = Math.max(minFlowNodeHeight, original.height + dy);
        }

        const nodeEl = document.querySelector(`.flow-node[data-id="${node.id}"]`);
        if (nodeEl) {
          nodeEl.style.left = `${node.x}px`;
          nodeEl.style.top = `${node.y}px`;
          nodeEl.style.width = `${node.width}px`;
          nodeEl.style.height = `${node.height}px`;
          nodeEl.style.zIndex = node.z || 1;
        }
        updateFlowEdgePaths();
      };

      const up = () => {
        board.mode = null;
        document.body.style.cursor = "";
        window.removeEventListener("pointermove", move);
        window.removeEventListener("pointerup", up);
        render();
        save();
      };

      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", up, { once: true });
    }

    function syncSelectionStyles() {
      document.querySelectorAll(".note").forEach(node => {
        node.classList.toggle("selected", board.selectedIds.has(node.dataset.id));
      });
    }

    function syncGroupStyles() {
      document.querySelectorAll(".group").forEach(node => {
        node.classList.toggle("selected", board.selectedGroupId === node.dataset.id);
        node.classList.toggle("drop-target", board.dropTargetGroupId === node.dataset.id);
      });
    }

    function bringNotesToFront(ids) {
      ids.forEach(id => {
        const note = board.notes.find(item => item.id === id);
        if (!note) return;
        note.z = board.nextZ++;
        const node = document.querySelector(`[data-id="${note.id}"]`);
        if (node) node.style.zIndex = note.z;
      });
    }

    function render() {
      world.innerHTML = "";
      if (activeMode === "flow") {
        renderFlow();
      } else {
        empty.textContent = "Project Board";
        fitGroupsToMembers();
        renderGroups();
        renderNotes();
        renderPalette();
      }
      applyView();
    }

    function setActiveMode(mode) {
      activeMode = mode;
      planningTab.classList.toggle("active", mode === "board");
      flowTab.classList.toggle("active", mode === "flow");
      document.querySelectorAll(".board-tool").forEach(node => node.classList.toggle("tool-hidden", mode !== "board"));
      document.querySelectorAll(".flow-tool").forEach(node => node.classList.toggle("tool-hidden", mode !== "flow"));
      hint.textContent = mode === "flow"
        ? "Drag the flow chart to pan. Middle-click a bubble to start a connector, then left-click another bubble to attach it."
        : "Drag the board to pan. Use the mouse wheel or trackpad to zoom. Shift-drag to select several notes, then create a group.";
      board.selectedIds = new Set();
      board.selectedGroupId = null;
      flow.selectedNodeId = null;
      flow.selectedNodeIds = new Set();
      flow.selectedEdgeIds = new Set();
      flow.connectFromId = null;
      flow.connectTargetId = null;
      flow.previewPoint = null;
      render();
    }

    function createNote(x, y, text = "", color = board.color, groupId = null) {
      const note = {
        id: uid("note"),
        x,
        y,
        color,
        text,
        html: plainTextToHtml(text),
        groupId,
        highlightColor: highlightColors[1].value,
        bold: false,
        italic: false,
        checklist: false,
        items: [],
        width: defaultNoteWidth,
        height: defaultNoteHeight,
        z: board.nextZ++
      };
      board.notes.push(note);
      board.selectedIds = new Set([note.id]);
      board.selectedGroupId = null;
      render();
      save();
      requestAnimationFrame(() => {
        const field = document.querySelector(`[data-id="${note.id}"] .note-editor, [data-id="${note.id}"] textarea, [data-id="${note.id}"] .check-item input[type="text"]`);
        field?.focus();
      });
    }

    function createNoteInGroup(groupId) {
      const group = board.groups.find(item => item.id === groupId);
      if (!group) return;
      const existing = board.notes.filter(note => note.groupId === groupId);
      const offset = Math.min(existing.length * 18, 96);
      createNote(group.x + 28 + offset, group.y + 74 + offset, "", group.noteColor || board.color, groupId);
    }

    function removeNotes(ids) {
      const idSet = new Set(ids);
      board.notes = board.notes.filter(note => !idSet.has(note.id));
      board.selectedIds = new Set([...board.selectedIds].filter(id => !idSet.has(id)));
      render();
      save();
    }

    function beginNoteResize(event, id, edge) {
      if (event.button !== 0) return;
      event.preventDefault();
      event.stopPropagation();
      const note = board.notes.find(item => item.id === id);
      if (!note) return;
      board.selectedIds = new Set([id]);
      board.selectedGroupId = null;
      bringNotesToFront([id]);
      syncSelectionStyles();
      syncGroupStyles();

      const start = screenToWorld(event.clientX, event.clientY);
      const original = {
        x: note.x,
        y: note.y,
        width: noteWidth(note),
        height: noteHeight(note)
      };
      board.mode = "resize-note";
      const resizeCursor = getComputedStyle(event.currentTarget).cursor;
      document.body.style.cursor = resizeCursor;
      event.currentTarget.setPointerCapture(event.pointerId);

      const move = moveEvent => {
        const now = screenToWorld(moveEvent.clientX, moveEvent.clientY);
        const dx = now.x - start.x;
        const dy = now.y - start.y;

        if (edge.includes("left")) {
          const nextWidth = Math.max(minNoteWidth, original.width - dx);
          note.width = nextWidth;
          note.x = original.x + original.width - nextWidth;
        }
        if (edge.includes("right")) {
          note.width = Math.max(minNoteWidth, original.width + dx);
        }
        if (edge.includes("bottom")) {
          note.height = Math.max(minNoteHeight, original.height + dy);
        }

        const noteNode = document.querySelector(`.note[data-id="${note.id}"]`);
        if (noteNode) {
          noteNode.style.left = `${note.x}px`;
          noteNode.style.top = `${note.y}px`;
          noteNode.style.width = `${note.width}px`;
          noteNode.style.height = `${note.height}px`;
          noteNode.style.zIndex = note.z || 1;
        }

        fitGroupsToMembers();
        board.groups.forEach(group => {
          const node = document.querySelector(`.group[data-id="${group.id}"]`);
          if (!node) return;
          node.style.left = `${group.x}px`;
          node.style.top = `${group.y}px`;
          node.style.width = `${group.width}px`;
          node.style.height = `${group.height}px`;
        });
      };

      const up = () => {
        board.mode = null;
        document.body.style.cursor = "";
        window.removeEventListener("pointermove", move);
        window.removeEventListener("pointerup", up);
        fitGroupsToMembers();
        render();
        save();
      };

      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", up, { once: true });
    }

    function beginNoteDrag(event, id) {
      if (event.button !== 0) return;
      event.stopPropagation();
      const note = board.notes.find(item => item.id === id);
      if (!note) return;
      board.selectedGroupId = null;
      syncGroupStyles();

      if (!event.shiftKey && !board.selectedIds.has(id)) {
        board.selectedIds = new Set([id]);
        syncSelectionStyles();
      } else if (event.shiftKey) {
        board.selectedIds.add(id);
        syncSelectionStyles();
      }

      bringNotesToFront([...board.selectedIds]);
      const selectedNotes = board.notes.filter(item => board.selectedIds.has(item.id));
      const start = screenToWorld(event.clientX, event.clientY);
      const starts = selectedNotes.map(item => ({ id: item.id, x: item.x, y: item.y }));
      const originalGroupIds = new Map(selectedNotes.map(item => [item.id, item.groupId || null]));
      board.mode = "drag-note";
      document.body.classList.add("dragging-item");
      event.currentTarget.setPointerCapture(event.pointerId);

      const move = moveEvent => {
        const now = screenToWorld(moveEvent.clientX, moveEvent.clientY);
        const dx = now.x - start.x;
        const dy = now.y - start.y;
        starts.forEach(original => {
          const item = board.notes.find(candidate => candidate.id === original.id);
          if (item) {
            item.x = original.x + dx;
            item.y = original.y + dy;
            const node = document.querySelector(`[data-id="${item.id}"]`);
            if (node) {
              node.style.left = `${item.x}px`;
              node.style.top = `${item.y}px`;
            }
          }
        });
        fitGroupsToMembers(new Set(starts.map(item => item.id)));
        board.dropTargetGroupId = findDropTargetGroup(selectedNotes);
        syncGroupStyles();
        board.groups.forEach(group => {
          const node = document.querySelector(`.group[data-id="${group.id}"]`);
          if (!node) return;
          node.style.left = `${group.x}px`;
          node.style.top = `${group.y}px`;
          node.style.width = `${group.width}px`;
          node.style.height = `${group.height}px`;
        });
      };

      const up = () => {
        board.mode = null;
        document.body.classList.remove("dragging-item");
        const targetGroupId = board.dropTargetGroupId;
        selectedNotes.forEach(item => {
          if (targetGroupId) {
            item.groupId = targetGroupId;
          } else if (originalGroupIds.get(item.id)) {
            delete item.groupId;
          }
        });
        board.dropTargetGroupId = null;
        fitGroupsToMembers();
        window.removeEventListener("pointermove", move);
        window.removeEventListener("pointerup", up);
        render();
        save();
      };

      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", up, { once: true });
    }

    function beginGroupDrag(event, groupId) {
      if (event.button !== 0 || event.target.closest(".group-actions, .group-resize-handle")) return;
      event.stopPropagation();
      const group = board.groups.find(item => item.id === groupId);
      if (!group) return;
      board.selectedIds = new Set();
      board.selectedGroupId = groupId;
      renderNotes();
      syncGroupStyles();

      const members = board.notes.filter(note => note.groupId === groupId);
      bringNotesToFront(members.map(note => note.id));
      const start = screenToWorld(event.clientX, event.clientY);
      const groupStart = { x: group.x, y: group.y };
      const noteStarts = members.map(note => ({ id: note.id, x: note.x, y: note.y }));
      board.mode = "drag-group";
      event.currentTarget.setPointerCapture(event.pointerId);

      const move = moveEvent => {
        const now = screenToWorld(moveEvent.clientX, moveEvent.clientY);
        const dx = now.x - start.x;
        const dy = now.y - start.y;
        group.x = groupStart.x + dx;
        group.y = groupStart.y + dy;
        const groupNode = document.querySelector(`.group[data-id="${group.id}"]`);
        if (groupNode) {
          groupNode.style.left = `${group.x}px`;
          groupNode.style.top = `${group.y}px`;
        }
        noteStarts.forEach(original => {
          const note = board.notes.find(item => item.id === original.id);
          if (!note) return;
          note.x = original.x + dx;
          note.y = original.y + dy;
          const noteNode = document.querySelector(`.note[data-id="${note.id}"]`);
          if (noteNode) {
            noteNode.style.left = `${note.x}px`;
            noteNode.style.top = `${note.y}px`;
          }
        });
      };

      const up = () => {
        board.mode = null;
        window.removeEventListener("pointermove", move);
        window.removeEventListener("pointerup", up);
        save();
      };

      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", up, { once: true });
    }

    function beginGroupResize(event, groupId, edge) {
      if (event.button !== 0) return;
      event.preventDefault();
      event.stopPropagation();
      const group = board.groups.find(item => item.id === groupId);
      if (!group) return;
      board.selectedIds = new Set();
      board.selectedGroupId = groupId;
      syncSelectionStyles();
      syncGroupStyles();

      const pad = 28;
      const header = 58;
      const members = board.notes.filter(note => note.groupId === groupId);
      const contentBounds = members.length ? {
        left: Math.min(...members.map(note => note.x)) - pad,
        top: Math.min(...members.map(note => note.y)) - header,
        right: Math.max(...members.map(note => note.x + noteWidth(note))) + pad,
        bottom: Math.max(...members.map(note => note.y + noteHeight(note))) + pad
      } : null;
      const start = screenToWorld(event.clientX, event.clientY);
      const original = {
        left: group.x,
        top: group.y,
        right: group.x + group.width,
        bottom: group.y + group.height
      };
      board.mode = "resize-group";
      document.body.style.cursor = getComputedStyle(event.currentTarget).cursor;
      event.currentTarget.setPointerCapture(event.pointerId);

      const move = moveEvent => {
        const now = screenToWorld(moveEvent.clientX, moveEvent.clientY);
        const dx = now.x - start.x;
        const dy = now.y - start.y;
        let left = original.left;
        let top = original.top;
        let right = original.right;
        let bottom = original.bottom;

        if (edge.includes("left")) {
          left = Math.min(original.left + dx, right - minGroupWidth);
          if (contentBounds) left = Math.min(left, contentBounds.left);
        }
        if (edge.includes("right")) {
          right = Math.max(original.right + dx, left + minGroupWidth);
          if (contentBounds) right = Math.max(right, contentBounds.right);
        }
        if (edge.includes("top")) {
          top = Math.min(original.top + dy, bottom - minGroupHeight);
          if (contentBounds) top = Math.min(top, contentBounds.top);
        }
        if (edge.includes("bottom")) {
          bottom = Math.max(original.bottom + dy, top + minGroupHeight);
          if (contentBounds) bottom = Math.max(bottom, contentBounds.bottom);
        }

        group.x = left;
        group.y = top;
        group.width = right - left;
        group.height = bottom - top;
        const groupNode = document.querySelector(`.group[data-id="${group.id}"]`);
        if (groupNode) {
          groupNode.style.left = `${group.x}px`;
          groupNode.style.top = `${group.y}px`;
          groupNode.style.width = `${group.width}px`;
          groupNode.style.height = `${group.height}px`;
        }
      };

      const up = () => {
        board.mode = null;
        document.body.style.cursor = "";
        window.removeEventListener("pointermove", move);
        window.removeEventListener("pointerup", up);
        render();
        save();
      };

      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", up, { once: true });
    }

    function beginPan(event) {
      if (event.button !== 0 || event.shiftKey) return;
      board.mode = "pan";
      viewport.classList.add("dragging");
      const view = activeMode === "flow" ? flow.view : board.view;
      const start = { x: event.clientX, y: event.clientY, viewX: view.x, viewY: view.y };

      const move = moveEvent => {
        view.x = start.viewX + moveEvent.clientX - start.x;
        view.y = start.viewY + moveEvent.clientY - start.y;
        applyView();
      };

      const up = () => {
        board.mode = null;
        viewport.classList.remove("dragging");
        window.removeEventListener("pointermove", move);
        window.removeEventListener("pointerup", up);
        save();
      };

      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", up, { once: true });
    }

    function beginSelection(event) {
      if (!event.shiftKey || event.button !== 0) return;
      board.mode = "select";
      const start = { x: event.clientX, y: event.clientY };
      selectionBox.style.display = "block";

      const move = moveEvent => {
        const left = Math.min(start.x, moveEvent.clientX);
        const top = Math.min(start.y, moveEvent.clientY);
        const width = Math.abs(moveEvent.clientX - start.x);
        const height = Math.abs(moveEvent.clientY - start.y);
        selectionBox.style.left = `${left}px`;
        selectionBox.style.top = `${top}px`;
        selectionBox.style.width = `${width}px`;
        selectionBox.style.height = `${height}px`;

        const a = screenToWorld(left, top);
        const b = screenToWorld(left + width, top + height);
        const box = {
          left: Math.min(a.x, b.x),
          top: Math.min(a.y, b.y),
          right: Math.max(a.x, b.x),
          bottom: Math.max(a.y, b.y)
        };
        board.selectedIds = new Set(board.notes
          .filter(note => note.x < box.right && note.x + noteWidth(note) > box.left && note.y < box.bottom && note.y + noteHeight(note) > box.top)
          .map(note => note.id));
        renderNotes();
      };

      const up = () => {
        board.mode = null;
        selectionBox.style.display = "none";
        selectionBox.style.width = "0";
        selectionBox.style.height = "0";
        window.removeEventListener("pointermove", move);
        window.removeEventListener("pointerup", up);
      };

      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", up, { once: true });
    }

    function zoomAt(clientX, clientY, delta) {
      const view = activeMode === "flow" ? flow.view : board.view;
      const oldScale = view.scale;
      const worldPoint = screenToWorld(clientX, clientY);
      const next = Math.min(2.5, Math.max(0.28, oldScale * delta));
      view.scale = next;
      view.x = clientX - worldPoint.x * next;
      view.y = clientY - worldPoint.y * next;
      applyView();
      save();
    }

    function selectedBounds() {
      const selected = board.notes.filter(note => board.selectedIds.has(note.id));
      if (!selected.length) return null;
      const left = Math.min(...selected.map(note => note.x));
      const top = Math.min(...selected.map(note => note.y));
      const right = Math.max(...selected.map(note => note.x + noteWidth(note)));
      const bottom = Math.max(...selected.map(note => note.y + noteHeight(note)));
      return { left, top, right, bottom };
    }

    function openGroupModal() {
      board.editingGroupId = null;
      document.getElementById("groupTitle").textContent = "Name this group";
      document.getElementById("confirmGroup").textContent = "Create group";
      groupName.value = "";
      groupSummary.textContent = board.selectedIds.size
        ? `${board.selectedIds.size} sticky notes will start inside this group.`
        : "Create an empty group area, then add sticky notes from the group header.";
      groupModal.classList.add("open");
      requestAnimationFrame(() => groupName.focus());
    }

    function openRenameGroupModal(groupId) {
      const group = board.groups.find(item => item.id === groupId);
      if (!group) return;
      board.editingGroupId = groupId;
      document.getElementById("groupTitle").textContent = "Rename group";
      document.getElementById("confirmGroup").textContent = "Save group";
      groupName.value = group.name;
      groupSummary.textContent = "Update the label shown behind this group of sticky notes.";
      groupModal.classList.add("open");
      requestAnimationFrame(() => {
        groupName.focus();
        groupName.select();
      });
    }

    function saveGroupFromModal() {
      if (board.editingGroupId) {
        const group = board.groups.find(item => item.id === board.editingGroupId);
        if (group) group.name = groupName.value.trim() || "Project Group";
        board.editingGroupId = null;
        groupModal.classList.remove("open");
        render();
        save();
        return;
      }

      let bounds = selectedBounds();
      if (!bounds) {
        const center = screenToWorld(window.innerWidth / 2, window.innerHeight / 2);
        bounds = {
          left: center.x - 180,
          top: center.y - 120,
          right: center.x + 180,
          bottom: center.y + 120
        };
      }
      const pad = 34;
      board.groups.push({
        id: uid("group"),
        name: groupName.value.trim() || "Project Group",
        color: groupColors[board.groups.length % groupColors.length],
        noteColor: board.color,
        x: bounds.left - pad,
        y: bounds.top - pad - 28,
        width: Math.max(520, bounds.right - bounds.left + pad * 2),
        height: Math.max(250, bounds.bottom - bounds.top + pad * 2 + 28)
      });
      const newGroup = board.groups[board.groups.length - 1];
      board.notes.forEach(note => {
        if (board.selectedIds.has(note.id)) note.groupId = newGroup.id;
      });
      groupModal.classList.remove("open");
      render();
      save();
    }

    function deleteGroup(groupId) {
      board.groups = board.groups.filter(group => group.id !== groupId);
      const removedNoteIds = new Set(board.notes.filter(note => note.groupId === groupId).map(note => note.id));
      board.notes = board.notes.filter(note => note.groupId !== groupId);
      board.selectedIds = new Set([...board.selectedIds].filter(id => !removedNoteIds.has(id)));
      if (board.selectedGroupId === groupId) board.selectedGroupId = null;
      if (board.dropTargetGroupId === groupId) board.dropTargetGroupId = null;
      render();
      save();
    }

    document.getElementById("addNote").addEventListener("click", () => {
      const center = screenToWorld(window.innerWidth / 2, window.innerHeight / 2);
      createNote(center.x - 105, center.y - 84);
    });

    document.getElementById("addFlowNode").addEventListener("click", () => {
      const center = screenToWorld(window.innerWidth / 2, window.innerHeight / 2);
      createFlowNode(center.x - defaultFlowNodeWidth / 2, center.y - defaultFlowNodeHeight / 2);
    });
    planningTab.addEventListener("click", () => setActiveMode("board"));
    flowTab.addEventListener("click", () => setActiveMode("flow"));

    document.getElementById("deleteSelected").addEventListener("click", () => {
      if (activeMode === "flow") {
        if (!removeSelectedFlowEdges()) removeSelectedFlowNodes();
        return;
      }
      if (board.selectedGroupId) {
        deleteGroup(board.selectedGroupId);
        board.selectedGroupId = null;
        return;
      }
      removeNotes([...board.selectedIds]);
    });
    document.getElementById("groupSelected").addEventListener("click", openGroupModal);
    document.getElementById("zoomIn").addEventListener("click", () => zoomAt(window.innerWidth / 2, window.innerHeight / 2, 1.16));
    document.getElementById("zoomOut").addEventListener("click", () => zoomAt(window.innerWidth / 2, window.innerHeight / 2, 0.86));
    document.getElementById("resetView").addEventListener("click", () => {
      if (activeMode === "flow") {
        flow.view = { x: window.innerWidth / 2, y: window.innerHeight / 2, scale: 1 };
      } else {
        board.view = { x: window.innerWidth / 2, y: window.innerHeight / 2, scale: 1 };
      }
      applyView();
      save();
    });
    document.getElementById("exportData").addEventListener("click", exportBoardData);
    document.getElementById("importDataButton").addEventListener("click", () => importData.click());
    importData.addEventListener("change", () => importBoardData(importData.files[0]));
    undoAction.addEventListener("click", undo);
    redoAction.addEventListener("click", redo);

    document.getElementById("cancelGroup").addEventListener("click", () => {
      board.editingGroupId = null;
      groupModal.classList.remove("open");
    });
    document.getElementById("confirmGroup").addEventListener("click", saveGroupFromModal);
    groupName.addEventListener("keydown", event => {
      if (event.key === "Enter") saveGroupFromModal();
      if (event.key === "Escape") {
        board.editingGroupId = null;
        groupModal.classList.remove("open");
      }
    });

    viewport.addEventListener("pointerdown", event => {
      if (event.target !== viewport && event.target !== world) return;
      if (activeMode === "flow") {
        flow.selectedNodeId = null;
        flow.selectedNodeIds = new Set();
        flow.selectedEdgeIds = new Set();
        flow.connectFromId = null;
        flow.connectTargetId = null;
        flow.previewPoint = null;
        render();
        beginPan(event);
        return;
      }
      if (event.shiftKey) {
        beginSelection(event);
      } else {
        board.selectedIds = new Set();
        board.selectedGroupId = null;
        renderNotes();
        syncGroupStyles();
        beginPan(event);
      }
    });

    app.addEventListener("dblclick", event => {
      if (event.target.closest(".toolbar") || event.target.closest(".note") || event.target.closest(".flow-node") || event.target.closest(".modal")) return;
      const point = screenToWorld(event.clientX, event.clientY);
      if (activeMode === "flow") {
        createFlowNode(point.x - defaultFlowNodeWidth / 2, point.y - defaultFlowNodeHeight / 2);
        return;
      }
      createNote(point.x - 105, point.y - 84);
    });

    app.addEventListener("pointermove", event => {
      if (activeMode !== "flow" || !flow.connectFromId) return;
      flow.previewPoint = screenToWorld(event.clientX, event.clientY);
      flow.connectTargetId = findFlowNodeAt(flow.previewPoint, flow.connectFromId);
      renderFlow();
    });

    app.addEventListener("wheel", event => {
      if (event.target.closest(".note textarea, .note .checklist, .note .note-editor")) return;
      event.preventDefault();
      zoomAt(event.clientX, event.clientY, event.deltaY < 0 ? 1.08 : 0.92);
    }, { passive: false });

    window.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();
      const usesCommand = event.ctrlKey || event.metaKey;
      const isUndo = usesCommand && key === "z" && !event.shiftKey;
      const isRedo = usesCommand && (key === "y" || (key === "z" && event.shiftKey));
      if (isUndo || isRedo) {
        event.preventDefault();
        if (isUndo) undo();
        if (isRedo) redo();
        return;
      }
      if (event.target.matches("textarea, input") || event.target.closest("[contenteditable='true']")) return;
      if (event.key === "Delete" || event.key === "Backspace") {
        if (activeMode === "flow") {
          if (!removeSelectedFlowEdges()) removeSelectedFlowNodes();
          return;
        }
        if (board.selectedGroupId) {
          deleteGroup(board.selectedGroupId);
          board.selectedGroupId = null;
        } else {
          removeNotes([...board.selectedIds]);
        }
      }
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "g") {
        event.preventDefault();
        if (activeMode === "board") openGroupModal();
      }
      if (event.key.toLowerCase() === "n") {
        const center = screenToWorld(window.innerWidth / 2, window.innerHeight / 2);
        if (activeMode === "flow") {
          createFlowNode(center.x - defaultFlowNodeWidth / 2, center.y - defaultFlowNodeHeight / 2);
          return;
        }
        createNote(center.x - 105, center.y - 84);
      }
    });

    window.addEventListener("resize", applyView);

    load();
    resetHistoryBaseline();
    setActiveMode(activeMode);
  </script>
</body>
</html>
